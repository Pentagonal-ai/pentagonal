name: Tweet on Push

on:
  push:
    branches: [main]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract commit info
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l | tr -d ' ')
          
          TWEET="⚡ Pentagonal dev update

${COMMIT_MSG}

${FILES_CHANGED} files changed

#Web3 #SmartContracts #BuildInPublic"
          
          TWEET="${TWEET:0:280}"
          
          echo "tweet<<EOF" >> $GITHUB_OUTPUT
          echo "$TWEET" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Refresh OAuth 2.0 token and tweet
        run: |
          # Refresh the access token
          REFRESH_RESPONSE=$(curl -s -X POST 'https://api.twitter.com/2/oauth2/token' \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=refresh_token' \
            --data-urlencode "refresh_token=${{ secrets.TWITTER_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=${{ secrets.TWITTER_OAUTH_CLIENT_ID }}" \
            --data-urlencode "client_secret=${{ secrets.TWITTER_OAUTH_CLIENT_SECRET }}")
          
          ACCESS_TOKEN=$(echo "$REFRESH_RESPONSE" | jq -r '.access_token')
          
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to refresh token: $REFRESH_RESPONSE"
            exit 1
          fi
          
          # Post the tweet
          TWEET_BODY=$(echo '${{ steps.commit.outputs.tweet }}' | jq -Rs '{ text: . }')
          
          RESPONSE=$(curl -s -X POST 'https://api.twitter.com/2/tweets' \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "$TWEET_BODY")
          
          echo "Tweet response: $RESPONSE"
          
          # Check for errors
          if echo "$RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Tweet failed"
            exit 1
          fi
          
          echo "Tweet posted successfully!"
