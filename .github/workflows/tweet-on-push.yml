name: Tweet on Push

on:
  push:
    branches: [main]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract commit info and tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l | tr -d ' ')

          npm install twitter-api-v2

          node -e "
            const { TwitterApi } = require('twitter-api-v2');

            const client = new TwitterApi({
              appKey: process.env.TWITTER_API_KEY,
              appSecret: process.env.TWITTER_API_SECRET,
              accessToken: process.env.TWITTER_ACCESS_TOKEN,
              accessSecret: process.env.TWITTER_ACCESS_TOKEN_SECRET,
            });

            const commitMsg = process.argv[1];
            const filesChanged = process.argv[2];

            const tweet = [
              '⚡ Pentagonal dev update',
              '',
              commitMsg,
              '',
              filesChanged + ' files changed',
              '',
              '#Web3 #SmartContracts #BuildInPublic'
            ].join('\n').slice(0, 280);

            client.v2.tweet(tweet)
              .then(res => {
                console.log('Tweet posted:', JSON.stringify(res.data));
              })
              .catch(err => {
                console.error('Tweet failed:', err.message);
                if (err.data) console.error('API response:', JSON.stringify(err.data));
                process.exit(1);
              });
          " "$COMMIT_MSG" "$FILES_CHANGED"
