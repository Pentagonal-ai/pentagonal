name: Tweet on Push

on:
  push:
    branches: [main]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract commit info
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l | tr -d ' ')
          TWEET=$(printf '⚡ Pentagonal dev update\n\n%s\n\n%s files changed\n\n#Web3 #SmartContracts #BuildInPublic' "$COMMIT_MSG" "$FILES_CHANGED")
          TWEET="${TWEET:0:280}"
          echo "tweet<<EOFTWEET" >> $GITHUB_OUTPUT
          echo "$TWEET" >> $GITHUB_OUTPUT
          echo "EOFTWEET" >> $GITHUB_OUTPUT

      - name: Refresh OAuth 2.0 token and tweet
        env:
          REFRESH_TOKEN: ${{ secrets.TWITTER_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.TWITTER_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TWITTER_OAUTH_CLIENT_SECRET }}
        run: |
          REFRESH_RESPONSE=$(curl -s -X POST 'https://api.twitter.com/2/oauth2/token' \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=refresh_token' \
            --data-urlencode "refresh_token=${REFRESH_TOKEN}" \
            --data-urlencode "client_id=${CLIENT_ID}" \
            --data-urlencode "client_secret=${CLIENT_SECRET}")

          ACCESS_TOKEN=$(echo "$REFRESH_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to refresh token: $REFRESH_RESPONSE"
            exit 1
          fi

          TWEET_TEXT='${{ steps.commit.outputs.tweet }}'
          TWEET_BODY=$(echo "$TWEET_TEXT" | jq -Rs '{ text: . }')

          RESPONSE=$(curl -s -X POST 'https://api.twitter.com/2/tweets' \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "$TWEET_BODY")

          echo "Tweet response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Tweet failed"
            exit 1
          fi

          echo "Tweet posted successfully!"
