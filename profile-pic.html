<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 512px;
    height: 512px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #3730a3 100%);
    overflow: hidden;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(165,180,252,0.18) 0%, rgba(99,102,241,0.08) 50%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  svg {
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <svg width="300" height="300" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="pent-gradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#c7d2fe" />
        <stop offset="100%" stop-color="#818cf8" />
      </linearGradient>
      <linearGradient id="pent-inner" x1="20" y1="16" x2="44" y2="52" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#e0e7ff" />
        <stop offset="100%" stop-color="#a5b4fc" />
      </linearGradient>
      <filter id="pent-glow">
        <feGaussianBlur stdDeviation="2" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- Outer pentagon -->
    <path d="M32 4 L58 23 L48 54 H16 L6 23 Z" stroke="url(#pent-gradient)" stroke-width="2.5" fill="none" stroke-linejoin="round" filter="url(#pent-glow)" />

    <!-- Mid pentagon -->
    <path d="M32 10 L52 25 L44 50 H20 L12 25 Z" fill="url(#pent-gradient)" opacity="0.1" stroke-linejoin="round" />
    <path d="M32 10 L52 25 L44 50 H20 L12 25 Z" stroke="url(#pent-gradient)" stroke-width="1.2" fill="none" opacity="0.5" stroke-linejoin="round" />

    <!-- Inner pentagon -->
    <path d="M32 18 L44 28 L39 43 H25 L20 28 Z" fill="url(#pent-inner)" opacity="0.15" stroke-linejoin="round" />
    <path d="M32 18 L44 28 L39 43 H25 L20 28 Z" stroke="url(#pent-inner)" stroke-width="1.4" fill="none" opacity="0.9" stroke-linejoin="round" />

    <!-- Center keystone -->
    <path d="M32 24 L38 30 L36 38 H28 L26 30 Z" fill="url(#pent-gradient)" opacity="0.3" stroke-linejoin="round" />

    <!-- Circuit traces -->
    <line x1="32" y1="4" x2="32" y2="18" stroke="#c7d2fe" stroke-width="0.7" opacity="0.6" />
    <line x1="58" y1="23" x2="44" y2="28" stroke="#c7d2fe" stroke-width="0.7" opacity="0.6" />
    <line x1="48" y1="54" x2="39" y2="43" stroke="#c7d2fe" stroke-width="0.7" opacity="0.6" />
    <line x1="16" y1="54" x2="25" y2="43" stroke="#c7d2fe" stroke-width="0.7" opacity="0.6" />
    <line x1="6" y1="23" x2="20" y2="28" stroke="#c7d2fe" stroke-width="0.7" opacity="0.6" />

    <!-- Outer vertex dots -->
    <circle cx="32" cy="4" r="1.8" fill="#a5b4fc" />
    <circle cx="58" cy="23" r="1.8" fill="#a5b4fc" />
    <circle cx="48" cy="54" r="1.8" fill="#a5b4fc" />
    <circle cx="16" cy="54" r="1.8" fill="#a5b4fc" />
    <circle cx="6" cy="23" r="1.8" fill="#a5b4fc" />

    <!-- Inner vertex dots -->
    <circle cx="32" cy="18" r="1.2" fill="#c7d2fe" />
    <circle cx="44" cy="28" r="1.2" fill="#c7d2fe" />
    <circle cx="39" cy="43" r="1.2" fill="#c7d2fe" />
    <circle cx="25" cy="43" r="1.2" fill="#c7d2fe" />
    <circle cx="20" cy="28" r="1.2" fill="#c7d2fe" />

    <!-- Center glow dot -->
    <circle cx="32" cy="32" r="2.5" fill="#c7d2fe" filter="url(#pent-glow)" />

    <!-- Cross-bracing -->
    <line x1="32" y1="10" x2="32" y2="24" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4" />
    <line x1="12" y1="25" x2="26" y2="30" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4" />
    <line x1="52" y1="25" x2="38" y2="30" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4" />
    <line x1="20" y1="50" x2="28" y2="38" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4" />
    <line x1="44" y1="50" x2="36" y2="38" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4" />
  </svg>
</body>
</html>
