<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pentagonal Profile Pic — Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #e8e8ec;
    font-family: 'Inter', sans-serif;
  }

  .canvas {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  svg {
    width: 400px;
    height: 400px;
  }
</style>
</head>
<body>
<div class="canvas">
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f0eef6"/>
      <stop offset="100%" stop-color="#e2dff0"/>
    </radialGradient>

    <!-- Pentagon gradient fill -->
    <linearGradient id="pentFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(99,91,194,0.06)"/>
      <stop offset="100%" stop-color="rgba(99,91,194,0.12)"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(99,91,194,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- Glow filter for nodes -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow for outer pentagon -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="shadow"/>
      <feOffset dx="0" dy="2"/>
      <feFlood flood-color="rgba(99,91,194,0.15)"/>
      <feComposite in2="shadow" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <circle cx="200" cy="200" r="195" fill="url(#grid)" opacity="0.8"/>

  <!-- Concentric guide rings -->
  <circle cx="200" cy="175" r="140" fill="none" stroke="rgba(99,91,194,0.05)" stroke-width="0.5"/>
  <circle cx="200" cy="175" r="105" fill="none" stroke="rgba(99,91,194,0.07)" stroke-width="0.5"/>
  <circle cx="200" cy="175" r="70" fill="none" stroke="rgba(99,91,194,0.05)" stroke-width="0.5"/>

  <!-- Outer pentagon (main shape) — shifted up to make room for text -->
  <polygon 
    points="200,45 330,139.5 280.3,288 119.7,288 70,139.5" 
    fill="url(#pentFill)" 
    stroke="#635bc2" 
    stroke-width="1.8"
    filter="url(#softShadow)"
  />

  <!-- Mid pentagon -->
  <polygon 
    points="200,85 295,156.5 258.6,252 141.4,252 105,156.5" 
    fill="none" 
    stroke="rgba(99,91,194,0.25)" 
    stroke-width="0.8"
  />

  <!-- Inner pentagon -->
  <polygon 
    points="200,125 260,173.5 237,214 163,214 140,173.5" 
    fill="rgba(99,91,194,0.04)" 
    stroke="rgba(99,91,194,0.35)" 
    stroke-width="0.8"
  />

  <!-- Star pattern — lines from center to outer vertices -->
  <line x1="200" y1="175" x2="200" y2="45" stroke="rgba(99,91,194,0.12)" stroke-width="0.5"/>
  <line x1="200" y1="175" x2="330" y2="139.5" stroke="rgba(99,91,194,0.12)" stroke-width="0.5"/>
  <line x1="200" y1="175" x2="280.3" y2="288" stroke="rgba(99,91,194,0.12)" stroke-width="0.5"/>
  <line x1="200" y1="175" x2="119.7" y2="288" stroke="rgba(99,91,194,0.12)" stroke-width="0.5"/>
  <line x1="200" y1="175" x2="70" y2="139.5" stroke="rgba(99,91,194,0.12)" stroke-width="0.5"/>

  <!-- Cross-lines connecting mid vertices for depth -->
  <line x1="200" y1="85" x2="258.6" y2="252" stroke="rgba(99,91,194,0.08)" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="200" y1="85" x2="141.4" y2="252" stroke="rgba(99,91,194,0.08)" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="295" y1="156.5" x2="141.4" y2="252" stroke="rgba(99,91,194,0.08)" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="105" y1="156.5" x2="258.6" y2="252" stroke="rgba(99,91,194,0.08)" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="295" y1="156.5" x2="105" y2="156.5" stroke="rgba(99,91,194,0.08)" stroke-width="0.4" stroke-dasharray="4,4"/>

  <!-- Node dots at outer vertices -->
  <circle cx="200" cy="45" r="3.5" fill="#635bc2" filter="url(#nodeGlow)"/>
  <circle cx="330" cy="139.5" r="3.5" fill="#635bc2" filter="url(#nodeGlow)"/>
  <circle cx="280.3" cy="288" r="3.5" fill="#635bc2" filter="url(#nodeGlow)"/>
  <circle cx="119.7" cy="288" r="3.5" fill="#635bc2" filter="url(#nodeGlow)"/>
  <circle cx="70" cy="139.5" r="3.5" fill="#635bc2" filter="url(#nodeGlow)"/>

  <!-- Node dots at mid vertices (smaller) -->
  <circle cx="200" cy="85" r="2" fill="rgba(99,91,194,0.5)"/>
  <circle cx="295" cy="156.5" r="2" fill="rgba(99,91,194,0.5)"/>
  <circle cx="258.6" cy="252" r="2" fill="rgba(99,91,194,0.5)"/>
  <circle cx="141.4" cy="252" r="2" fill="rgba(99,91,194,0.5)"/>
  <circle cx="105" cy="156.5" r="2" fill="rgba(99,91,194,0.5)"/>

  <!-- Center dot -->
  <circle cx="200" cy="175" r="3" fill="#635bc2" opacity="0.6"/>

  <!-- PENTAGONAL wordmark -->
  <text 
    x="200" 
    y="340" 
    text-anchor="middle" 
    font-family="'Inter', sans-serif" 
    font-weight="500" 
    font-size="22" 
    letter-spacing="6"
    fill="#635bc2"
  >PENTAGONAL</text>

</svg>
</div>
</body>
</html>
